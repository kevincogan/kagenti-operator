# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: ghcr.io/kagenti/kagenti-operator/kagenti-operator
      tag: __PLACEHOLDER__
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
      - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
    cmd: /ko-app/cmd
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: controller-manager

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [SIGNATURE VERIFICATION]: A2A AgentCard signature verification
signatureVerification:
  # Enable signature verification for A2A AgentCards
  enabled: false
  
  # Audit mode: log verification failures but don't block agents
  # Useful for testing and gradual rollout
  auditMode: false
  
  # Signature provider type: "secret", "jwks", or "none"
  provider: secret
  
  # Configuration for "secret" provider
  secret:
    # Name of the Kubernetes Secret containing public keys
    name: a2a-public-keys
    # Namespace of the Secret
    namespace: kagenti-system
    # Specific key in the Secret to use (leave empty to auto-detect)
    key: ""
  
  # Configuration for "jwks" provider
  jwks:
    # URL of the JWKS endpoint
    url: ""
  
  # Network policy enforcement
  # When enabled, NetworkPolicies are created to enforce signature verification at the network layer
  # Unverified agents will have restrictive network policies blocking agent-to-agent communication
  enforceNetworkPolicies: false