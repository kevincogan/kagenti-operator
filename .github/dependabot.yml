version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]

  - package-ecosystem: "gomod"
    directory: "/kagenti-operator"
    schedule:
      interval: "weekly"
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types: [minor, patch]
      major:
        update-types: [major]
